services:
  - type: web
    name: advanced-chatbot-node-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: System
      - key: ADMIN_LAST_NAME
        value: Admin

  - type: web
    name: advanced-chatbot-ai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    pythonVersion: 3.10.14
    envVars:
      - key: RAG_CONFIDENCE_THRESHOLD
        value: 0.45
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: advanced-chatbot-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_AI_API_URL
        sync: false
      - key: VITE_RAG_CONFIDENCE_THRESHOLD
        value: 0.45
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
